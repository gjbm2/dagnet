version: "1.0.0"

forecasting:
  # Recency weighting half-life (days). Higher = more stable; lower = more responsive.
  RECENCY_HALF_LIFE_DAYS: 30

  # Minimum effective sample size for recency-weighted baselines (stability guardrail).
  LATENCY_MIN_EFFECTIVE_SAMPLE_SIZE: 150

  # Default maturity horizon (days) when no reliable edge-specific t95 is available.
  DEFAULT_T95_DAYS: 30

  # Forecast prior strength (λ) for blending forecast vs evidence in immature data.
  FORECAST_BLEND_LAMBDA: 0.15

  # Completeness conservatism power (η) used when computing the blend weight.
  LATENCY_BLEND_COMPLETENESS_POWER: 2.25

  # Credibility threshold (conversions) for trusting observed anchor-delay evidence (cohort completeness on downstream edges).
  ANCHOR_DELAY_BLEND_K_CONVERSIONS: 50

  # Onset derivation: α mass threshold for window() lag histograms.
  # Interpretation: onset is the earliest day by which α of conversion mass has occurred.
  # Stored as `onset_delta_days` rounded to 1 d.p.
  ONSET_MASS_FRACTION_ALPHA: 0.01

  # Onset aggregation: β for weighted quantile across window() slice families in the topo pass.
  # Weighted by number of dates in each window() series (dates.length).
  # β=0.5 behaves like a robust median and avoids single-slice outliers.
  ONSET_AGGREGATION_BETA: 0.5

  # Lag fit guardrail: maximum acceptable mean/median ratio when fitting a lognormal from moments.
  #
  # Setting this very large effectively disables the guardrail (σ will be inferred from moments even
  # for very heavy-tailed cases). This is useful when onset shifting makes medianX small, and real
  # tails would otherwise be incorrectly suppressed.
  LATENCY_MAX_MEAN_MEDIAN_RATIO: 999999

  # ── Bayesian model priors ──────────────────────────────────

  # Centre of LogNormal prior on κ (overdispersion concentration).
  # log(30) ≈ 3.4. Higher = expect less day-to-day rate variation.
  BAYES_LOG_KAPPA_MU: 3.4012

  # Width of LogNormal prior on κ. 1.5 → 95% CI ≈ [2, 500].
  BAYES_LOG_KAPPA_SIGMA: 1.5

  # Effective sample size for fallback Beta prior (no Phase 1 posterior).
  BAYES_FALLBACK_PRIOR_ESS: 20

  # Minimum Beta/Dirichlet concentration. 0.5 = Jeffreys prior.
  BAYES_DIRICHLET_CONC_FLOOR: 0.5

  # Minimum latency σ. Below this, edge treated as instant (no latency).
  BAYES_SIGMA_FLOOR: 0.01

  # Minimum uncertainty on latency μ prior (exploration room for sampler).
  BAYES_MU_PRIOR_SIGMA_FLOOR: 0.5

  # Minimum CDF completeness for observations in dispersion estimation.
  BAYES_MATURITY_FLOOR: 0.9

  # Softplus onset sharpness. Higher = sharper cutoff below onset.
  BAYES_SOFTPLUS_SHARPNESS: 8.0

  # ── Bayesian convergence thresholds ──────────────────────────

  # Max Gelman-Rubin statistic for convergence.
  BAYES_RHAT_THRESHOLD: 1.05

  # Min effective sample size for convergence.
  BAYES_ESS_THRESHOLD: 400

  # Quality gate for accepting previous posterior as warm-start.
  BAYES_WARM_START_RHAT_MAX: 1.10
  BAYES_WARM_START_ESS_MIN: 100

  # Credible interval probability (0.90 = 90% HDI).
  BAYES_HDI_PROB: 0.90

  # ── Bayesian sampling ────────────────────────────────────────

  # MCMC draws per chain (post-warmup).
  BAYES_DRAWS: 2000

  # MCMC warmup iterations per chain.
  BAYES_TUNE: 1000

  # Number of MCMC chains.
  BAYES_CHAINS: 4

  # NUTS target acceptance rate.
  BAYES_TARGET_ACCEPT: 0.90

  # Per-cohort drift fraction around the global Bayesian posterior (cohort maturity fan chart).
  # 0 = no drift; 0.1–0.2 = modest (default); 0.5–1.0 = large deviation per cohort.
  COHORT_DRIFT_FRACTION: 0.20

development:
  debugGitOperations: false
