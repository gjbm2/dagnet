# Ground truth for synth-diamond-context-two-dim
#
# Diamond topology (Anchor → Gate → {Path-A, Path-B} → Join → Outcome)
# with TWO orthogonal MECE context dimensions (channel + device).
#
# Fills gap: 2-dim × non-trivial topology. Tests that cross-product
# DSL slices wire correctly through join nodes.
#
# Same base truth as synth-diamond-context but adds device dimension.
# Design reference: doc 44 §6 gap T2.1 + gap 1

simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 50
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 60
  expected_sample_seconds: 3600

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-d2d-anchor-to-gate:
            p_mult: 1.10
            mu_offset: -0.2
          synth-d2d-gate-to-path-a:
            p_mult: 1.15
            mu_offset: -0.2
          synth-d2d-gate-to-path-b:
            p_mult: 1.15
            mu_offset: -0.3
          synth-d2d-path-a-to-join:
            p_mult: 1.10
            mu_offset: -0.2
          synth-d2d-path-b-to-join:
            p_mult: 1.15
            mu_offset: -0.2
          synth-d2d-join-to-outcome:
            p_mult: 1.20
            mu_offset: -0.2
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-d2d-anchor-to-gate:
            p_mult: 1.0
          synth-d2d-gate-to-path-a:
            p_mult: 1.0
          synth-d2d-gate-to-path-b:
            p_mult: 1.0
          synth-d2d-path-a-to-join:
            p_mult: 1.0
          synth-d2d-path-b-to-join:
            p_mult: 1.0
          synth-d2d-join-to-outcome:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-d2d-anchor-to-gate:
            p_mult: 0.80
            mu_offset: 0.3
          synth-d2d-gate-to-path-a:
            p_mult: 0.75
            mu_offset: 0.3
          synth-d2d-gate-to-path-b:
            p_mult: 0.75
            mu_offset: 0.4
          synth-d2d-path-a-to-join:
            p_mult: 0.75
            mu_offset: 0.3
          synth-d2d-path-b-to-join:
            p_mult: 0.70
            mu_offset: 0.3
          synth-d2d-join-to-outcome:
            p_mult: 0.65
            mu_offset: 0.3

  - id: synth-device
    mece: true
    values:
      - id: mobile
        label: Mobile
        weight: 0.55
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'mobile'
        edges:
          synth-d2d-anchor-to-gate:
            p_mult: 1.10
            mu_offset: 0.15
          synth-d2d-gate-to-path-a:
            p_mult: 1.10
            mu_offset: 0.15
          synth-d2d-gate-to-path-b:
            p_mult: 1.10
            mu_offset: 0.15
          synth-d2d-path-a-to-join:
            p_mult: 1.10
            mu_offset: 0.15
          synth-d2d-path-b-to-join:
            p_mult: 1.10
            mu_offset: 0.15
          synth-d2d-join-to-outcome:
            p_mult: 1.10
            mu_offset: 0.15
      - id: desktop
        label: Desktop
        weight: 0.45
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'desktop'
        edges:
          synth-d2d-anchor-to-gate:
            p_mult: 0.90
            mu_offset: -0.15
          synth-d2d-gate-to-path-a:
            p_mult: 0.90
            mu_offset: -0.15
          synth-d2d-gate-to-path-b:
            p_mult: 0.90
            mu_offset: -0.15
          synth-d2d-path-a-to-join:
            p_mult: 0.90
            mu_offset: -0.15
          synth-d2d-path-b-to-join:
            p_mult: 0.90
            mu_offset: -0.15
          synth-d2d-join-to-outcome:
            p_mult: 0.90
            mu_offset: -0.15

edges:
  synth-d2d-anchor-to-gate:
    from: anchor
    to: gate
    p: 0.85
    onset: 1.0
    mu: 2.0
    sigma: 0.5
  synth-d2d-gate-to-path-a:
    from: gate
    to: path-a
    p: 0.40
    onset: 2.0
    mu: 2.3
    sigma: 0.5
  synth-d2d-gate-to-path-b:
    from: gate
    to: path-b
    p: 0.35
    onset: 3.0
    mu: 2.5
    sigma: 0.6
  synth-d2d-path-a-to-join:
    from: path-a
    to: join
    p: 0.70
    onset: 1.0
    mu: 2.0
    sigma: 0.4
  synth-d2d-path-b-to-join:
    from: path-b
    to: join
    p: 0.60
    onset: 2.0
    mu: 2.2
    sigma: 0.5
  synth-d2d-join-to-outcome:
    from: join
    to: outcome
    p: 0.50
    onset: 1.0
    mu: 2.0
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-d2d-anchor
  gate:
    type: event
    label: Gate
    event_id: synth-d2d-gate
  path-a:
    type: event
    label: Path A
    event_id: synth-d2d-path-a
  path-b:
    type: event
    label: Path B
    event_id: synth-d2d-path-b
  join:
    type: event
    label: Join
    event_id: synth-d2d-join
  outcome:
    absorbing: true
    type: event
    label: Outcome
    event_id: synth-d2d-outcome
    outcome_type: success

graph:
  name: synth-diamond-context-two-dim
  description: "Diamond (branch+join) with two orthogonal MECE dimensions (channel + device). Doc 44 gap coverage."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.5
    weight_z: 3.5
