# Ground truth for synth-context-independent-mixed (I3 — independent dimension, mixed epoch)
#
# Anchor → Target (solo edge), one independent dimension, mixed epochs:
#   Days 0-44:  uncontexted (bare aggregate rows only)
#   Days 45-89: contexted (per-slice MECE rows, onboarding-variant)
#
# Tests that p_base is always emitted and correctly informed even when
# the only context dimension is independent (no hierarchical link).
#
# During uncontexted epoch: aggregate data feeds p_base directly.
# During contexted epoch: per-slice data feeds independent slice vars.
# p_base receives no likelihood terms from the contexted epoch (no
# hierarchy to propagate through) — it is informed solely by the
# aggregate epoch.
#
# Same slice parameters as I1 (wide-apart rates).
#
# Recovery targets:
#   - p_base posterior reflects the aggregate truth from days 0-44
#     (weighted mean ~0.24), NOT prior-dominated
#   - Per-slice posteriors reflect the contexted truth from days 45-89,
#     with wider uncertainty (only half the observation window)
#   - flow_c must not shrink toward p_base despite limited data
#   - No double-counting: aggregate and per-slice cover disjoint dates
#
# See doc 14 §15A.5 "independent context flag", §5.7 "per-date routing"

# SHARED-CONTEXT:
#   dim 'synth-onboarding-variant' renders to contexts/synth-onboarding-variant.yaml
#     shared with: synth-context-independent, synth-context-independent-pooled
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 52
  expected_sample_seconds: 1800

# Global flag false — epochs control per-day emission
emit_context_slices: false

epochs:
  - label: "uncontexted"
    from_day: 0
    to_day: 44
    emit_context_slices: false
  - label: "contexted"
    from_day: 45
    to_day: 89
    emit_context_slices: true

context_dimensions:
  - id: synth-onboarding-variant
    mece: true
    independent: true
    values:
      - id: flow_a
        label: Flow A
        weight: 0.50
        sources:
          amplitude:
            field: onboarding_flow
            filter: onboarding_flow == 'flow_a'
        edges:
          synth-ind3-anchor-to-target:
            p_mult: 1.46    # → 0.35
      - id: flow_b
        label: Flow B
        weight: 0.35
        sources:
          amplitude:
            field: onboarding_flow
            filter: onboarding_flow == 'flow_b'
        edges:
          synth-ind3-anchor-to-target:
            p_mult: 0.33    # → 0.08
      - id: flow_c
        label: Flow C
        weight: 0.15
        sources:
          amplitude:
            field: onboarding_flow
            filter: onboarding_flow == 'flow_c'
        edges:
          synth-ind3-anchor-to-target:
            p_mult: 2.29    # → 0.55

edges:
  synth-ind3-anchor-to-target:
    from: anchor
    to: target
    p: 0.24
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-ind3-anchor
  target:
    type: event
    label: Target
    event_id: synth-ind3-target

graph:
  name: synth-context-independent-mixed
  description: "I3: independent dimension, mixed epoch — days 0-44 bare, days 45-89 contexted. Tests p_base always emitted."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.5
    weight_z: 3.0
