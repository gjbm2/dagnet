# Ground truth for synth-context-independent-pooled (I2 — independent + pooled dimensions)
#
# Anchor → Target (solo edge), two context dimensions:
#   - synth-onboarding-variant: independent: true (3 values, wide-apart p)
#   - synth-channel: independent: false (3 values, close p — standard pooling)
#
# This is the realistic production scenario: one dimension encodes
# genuinely different journeys (independent), another encodes
# exchangeable variations (pooled). Tests that the two mechanisms
# coexist without interference.
#
# Onboarding (independent, wide-apart):
#   flow_a: 50% traffic, p_mult 1.46 (→ 0.35)
#   flow_b: 35% traffic, p_mult 0.33 (→ 0.08)
#   flow_c: 15% traffic, p_mult 2.29 (→ 0.55)
#
# Channel (pooled, close together):
#   google:  60% traffic, p_mult 1.10 (→ 0.264)
#   direct:  30% traffic, p_mult 0.95 (→ 0.228)
#   email:   10% traffic, p_mult 0.90 (→ 0.216)
#
# Recovery targets:
#   - Independent dimension: per-slice posteriors recover wide-apart
#     truth values without shrinkage. No tau emitted for this dimension.
#   - Pooled dimension: per-slice posteriors recover close-together
#     truth values with appropriate shrinkage via tau.
#   - p_base: informed by pooled dimension's hierarchy + independent
#     dimension's likelihood terms. HDI contains weighted aggregate.
#   - Key test: flow_c (independent, small n) must NOT be pulled
#     toward mean, while email (pooled, small n) SHOULD shrink toward
#     p_base — confirming the two mechanisms behave differently.
#
# See doc 14 §15A.5 "independent context flag"

simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 51
  expected_sample_seconds: 2400

emit_context_slices: true

context_dimensions:
  - id: synth-onboarding-variant
    mece: true
    independent: true
    values:
      - id: flow_a
        label: Flow A
        weight: 0.50
        sources:
          amplitude:
            field: onboarding_flow
            filter: onboarding_flow == 'flow_a'
        edges:
          synth-ind2-anchor-to-target:
            p_mult: 1.46
      - id: flow_b
        label: Flow B
        weight: 0.35
        sources:
          amplitude:
            field: onboarding_flow
            filter: onboarding_flow == 'flow_b'
        edges:
          synth-ind2-anchor-to-target:
            p_mult: 0.33
      - id: flow_c
        label: Flow C
        weight: 0.15
        sources:
          amplitude:
            field: onboarding_flow
            filter: onboarding_flow == 'flow_c'
        edges:
          synth-ind2-anchor-to-target:
            p_mult: 2.29

  - id: synth-channel
    mece: true
    independent: false
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-ind2-anchor-to-target:
            p_mult: 1.10
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-ind2-anchor-to-target:
            p_mult: 0.95
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-ind2-anchor-to-target:
            p_mult: 0.90

edges:
  synth-ind2-anchor-to-target:
    from: anchor
    to: target
    p: 0.24
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-ind2-anchor
  target:
    type: event
    label: Target
    event_id: synth-ind2-target

graph:
  name: synth-context-independent-pooled
  description: "I2: independent + pooled dimensions on same edge. Tests coexistence without interference."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.5
    weight_z: 3.0
