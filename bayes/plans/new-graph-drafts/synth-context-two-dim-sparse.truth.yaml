# Ground truth for synth-context-two-dim-sparse
#
# Solo edge (Anchor → Target) with two orthogonal MECE dimensions
# AND sparsity layer. The hardest combination for the compiler:
# cross-product slices with missing data frames.
#
# Fills gap: sparse × 2-dim. Tests graceful degradation when
# some edge×slice×day cells have zero observations.
#
# Same base truth as synth-context-two-dim + sparsity.
# Design reference: doc 44 §6 gap 5

simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 64
  expected_sample_seconds: 3000
  # Sparsity layer (doc 40)
  frame_drop_rate: 0.20
  toggle_rate: 0.03
  initial_absent_pct: 0.30

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-2ds-anchor-to-target:
            p_mult: 1.33
            mu_offset: -0.3
            onset_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-2ds-anchor-to-target:
            p_mult: 0.83
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-2ds-anchor-to-target:
            p_mult: 0.50
            mu_offset: 0.4
            onset_offset: 0.5

  - id: synth-device
    mece: true
    values:
      - id: mobile
        label: Mobile
        weight: 0.55
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'mobile'
        edges:
          synth-2ds-anchor-to-target:
            p_mult: 1.15
            mu_offset: 0.2
      - id: desktop
        label: Desktop
        weight: 0.45
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'desktop'
        edges:
          synth-2ds-anchor-to-target:
            p_mult: 0.85
            mu_offset: -0.2

edges:
  synth-2ds-anchor-to-target:
    from: anchor
    to: target
    p: 0.30
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-2ds-anchor
  target:
    type: event
    label: Target
    event_id: synth-2ds-target

graph:
  name: synth-context-two-dim-sparse
  description: "Solo edge with two MECE dimensions + sparsity layer. Hardest combination. Doc 44 gap coverage."

testing:
  thresholds:
    p_z: 3.5
    mu_z: 3.5
    sigma_z: 4.0
    onset_z: 4.0
  per_slice_thresholds:
    p_slice_z: 4.0
    weight_z: 4.0
