# Ground truth for synth-diamond-context-mixed
#
# Diamond topology (Anchor → Gate → {Path-A, Path-B} → Join → Outcome)
# with mixed epochs: days 0-49 bare, days 50-99 contexted.
#
# Fills gap: mixed-epoch × non-trivial topology. Tests that epoch
# boundary routing works correctly through join nodes and that
# bare/context posteriors don't contaminate each other.
#
# Same base truth as synth-diamond-context.
# Design reference: doc 44 §6 gap 3

simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 50
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 61
  expected_sample_seconds: 3000

emit_context_slices: false

epochs:
  - label: "uncontexted"
    from_day: 0
    to_day: 49
    emit_context_slices: false
  - label: "contexted"
    from_day: 50
    to_day: 99
    emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-dcm-anchor-to-gate:
            p_mult: 1.10
            mu_offset: -0.2
          synth-dcm-gate-to-path-a:
            p_mult: 1.15
            mu_offset: -0.2
          synth-dcm-gate-to-path-b:
            p_mult: 1.15
            mu_offset: -0.3
          synth-dcm-path-a-to-join:
            p_mult: 1.10
            mu_offset: -0.2
          synth-dcm-path-b-to-join:
            p_mult: 1.15
            mu_offset: -0.2
          synth-dcm-join-to-outcome:
            p_mult: 1.20
            mu_offset: -0.2
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-dcm-anchor-to-gate:
            p_mult: 1.0
          synth-dcm-gate-to-path-a:
            p_mult: 1.0
          synth-dcm-gate-to-path-b:
            p_mult: 1.0
          synth-dcm-path-a-to-join:
            p_mult: 1.0
          synth-dcm-path-b-to-join:
            p_mult: 1.0
          synth-dcm-join-to-outcome:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-dcm-anchor-to-gate:
            p_mult: 0.80
            mu_offset: 0.3
          synth-dcm-gate-to-path-a:
            p_mult: 0.75
            mu_offset: 0.3
          synth-dcm-gate-to-path-b:
            p_mult: 0.75
            mu_offset: 0.4
          synth-dcm-path-a-to-join:
            p_mult: 0.75
            mu_offset: 0.3
          synth-dcm-path-b-to-join:
            p_mult: 0.70
            mu_offset: 0.3
          synth-dcm-join-to-outcome:
            p_mult: 0.65
            mu_offset: 0.3

edges:
  synth-dcm-anchor-to-gate:
    from: anchor
    to: gate
    p: 0.85
    onset: 1.0
    mu: 2.0
    sigma: 0.5
  synth-dcm-gate-to-path-a:
    from: gate
    to: path-a
    p: 0.40
    onset: 2.0
    mu: 2.3
    sigma: 0.5
  synth-dcm-gate-to-path-b:
    from: gate
    to: path-b
    p: 0.35
    onset: 3.0
    mu: 2.5
    sigma: 0.6
  synth-dcm-path-a-to-join:
    from: path-a
    to: join
    p: 0.70
    onset: 1.0
    mu: 2.0
    sigma: 0.4
  synth-dcm-path-b-to-join:
    from: path-b
    to: join
    p: 0.60
    onset: 2.0
    mu: 2.2
    sigma: 0.5
  synth-dcm-join-to-outcome:
    from: join
    to: outcome
    p: 0.50
    onset: 1.0
    mu: 2.0
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-dcm-anchor
  gate:
    type: event
    label: Gate
    event_id: synth-dcm-gate
  path-a:
    type: event
    label: Path A
    event_id: synth-dcm-path-a
  path-b:
    type: event
    label: Path B
    event_id: synth-dcm-path-b
  join:
    type: event
    label: Join
    event_id: synth-dcm-join
  outcome:
    absorbing: true
    type: event
    label: Outcome
    event_id: synth-dcm-outcome
    outcome_type: success

graph:
  name: synth-diamond-context-mixed
  description: "Diamond (branch+join) with mixed epochs — days 0-49 bare, days 50-99 contexted. Doc 44 gap coverage."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.5
    weight_z: 3.5
