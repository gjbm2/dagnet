# Ground truth for synth-mirror-4step-context
#
# Landing → Created → Delegated → Registered → Success
# 4-step linear chain with MECE context dimension.
# First two edges are instant (no latency), last two have latency.
# Tests hierarchical shrinkage on a deep chain with mixed latency edges.

simulation:
  mean_daily_traffic: 1600
  n_days: 100
  user_kappa: 50
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  snapshot_start_offset: 50
  traffic_cv: 1.0
  expected_sample_seconds: 1800

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          m4-landing-to-created:
            p_mult: 1.25
          m4-created-to-delegated:
            p_mult: 1.10
          m4-delegated-to-registered:
            p_mult: 1.20
            mu_offset: -0.2
            onset_offset: -0.5
          m4-registered-to-success:
            p_mult: 1.10
            mu_offset: -0.2
            onset_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          m4-landing-to-created:
            p_mult: 1.0
          m4-created-to-delegated:
            p_mult: 1.0
          m4-delegated-to-registered:
            p_mult: 1.0
          m4-registered-to-success:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          m4-landing-to-created:
            p_mult: 0.60
          m4-created-to-delegated:
            p_mult: 0.80
          m4-delegated-to-registered:
            p_mult: 0.65
            mu_offset: 0.3
            onset_offset: 0.5
          m4-registered-to-success:
            p_mult: 0.75
            mu_offset: 0.3
            onset_offset: 0.4

edges:
  m4-landing-to-created:
    from: landing
    to: created
    p: 0.18
    onset: 0.0
    mu: 0.0
    sigma: 0.0
  m4-created-to-delegated:
    from: created
    to: delegated
    p: 0.55
    onset: 0.0
    mu: 0.0
    sigma: 0.0
  m4-delegated-to-registered:
    from: delegated
    to: registered
    p: 0.11
    onset: 5.5
    mu: 1.5
    sigma: 0.57
  m4-registered-to-success:
    from: registered
    to: success
    p: 0.70
    onset: 3.2
    mu: 1.3
    sigma: 0.19

nodes:
  landing:
    start: true
    type: entry
    label: Landing
    event_id: synth-m4-landing
  created:
    type: event
    label: Created
    event_id: synth-m4-created
  delegated:
    type: event
    label: Delegated
    event_id: synth-m4-delegated
  registered:
    type: event
    label: Registered
    event_id: synth-m4-registered
  success:
    absorbing: true
    type: event
    label: Success
    event_id: synth-m4-success
    outcome_type: success

graph:
  name: synth-mirror-4step-context
  description: "4-step chain with MECE context. Mixed latency/instant edges."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
