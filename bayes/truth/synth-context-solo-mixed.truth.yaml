# Ground truth for synth-context-solo-mixed (S3 — mixed-epoch solo edge)
#
# Same topology as S1 (Anchor → Target, solo edge) but with mixed epochs:
#   Days 0-44:  uncontexted (bare aggregate rows only)
#   Days 45-89: contexted (per-context MECE rows, channel dimension)
#
# Tests R2d per-date regime routing:
#   - Uncontexted dates feed aggregate likelihood (parent p_base)
#   - Contexted dates feed per-slice likelihoods (per-slice p)
#   - No double-counting: aggregate and per-slice cover disjoint dates
#   - Posterior width should not be narrower than single-epoch equivalent
#
# Same context dimension and per-slice parameters as S1.
# See doc 14 section 5.7 "Per-date likelihood routing"

# SHARED-CONTEXT:
#   dim 'synth-channel' renders to contexts/synth-channel.yaml
#     shared with: synth-3way-join-context, synth-abc-context-mixed, synth-abc-context-two-dim, synth-abc-sparse-1, synth-abc-sparse-2, synth-abc-sparse-3, synth-abc-sparse-4, synth-context-independent-pooled, synth-context-solo, synth-context-staggered, synth-context-two-dim, synth-context-two-dim-sparse, synth-diamond-context, synth-diamond-context-mixed, synth-diamond-context-sparse, synth-diamond-context-two-dim, synth-diamond-sparse-1, synth-diamond-sparse-2, synth-diamond-sparse-3, synth-diamond-sparse-4, synth-fanout-context, synth-fanout-context-mixed, synth-join-branch-context, synth-lattice-context, synth-mirror-4step-context, synth-simple-abc-context, synth-skip-context, synth-skip-context-sparse, synth-solo-sparse-1, synth-solo-sparse-2, synth-solo-sparse-3, synth-solo-sparse-4
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  expected_sample_seconds: 1800

# Global flag false — epochs control per-day emission
emit_context_slices: false

epochs:
  - label: "uncontexted"
    from_day: 0
    to_day: 44
    emit_context_slices: false
  - label: "contexted"
    from_day: 45
    to_day: 89
    emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-context-solo-mixed-synth-ctx1-anchor-to-target:
            p_mult: 1.33
            mu_offset: -0.3
            onset_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-context-solo-mixed-synth-ctx1-anchor-to-target:
            p_mult: 0.83
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-context-solo-mixed-synth-ctx1-anchor-to-target:
            p_mult: 0.50
            mu_offset: 0.4
            onset_offset: 0.5

edges:
  synth-context-solo-mixed-synth-ctx1-anchor-to-target:
    from: anchor
    to: target
    p: 0.30
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-ctx1-anchor
  target:
    type: event
    label: Target
    event_id: synth-ctx1-target

graph:
  name: synth-context-solo-mixed
  description: "S3: mixed-epoch solo edge — days 0-44 bare, days 45-89 contexted. R2d routing test."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
