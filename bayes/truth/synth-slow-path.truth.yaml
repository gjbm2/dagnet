# Ground truth for synth-slow-path
#
# A → B → C → D → E (4 edges, linear chain)
# Same linear topology as mirror-4step but with LONG upstream latency
# on edge C→D (t95 ≈ 100d) to expose the Pop C CDF dilution defect
# in multi-hop composition.
#
# The downstream edge D→E has moderate latency (t95 ≈ 26d).
# Path C→E has t95 ≈ 126d. At tau=90 the path CDF is ~0.6 while
# the D→E edge CDF is ~1.0.
#
# Test invariant: multi-hop midpoint(C→E) ≈ midpoint(C→D) × midpoint(D→E)

graph:
  name: synth-slow-path
  description: Linear chain with slow upstream latency for multi-hop composition testing

simulation:
  mean_daily_traffic: 2000
  n_days: 150
  kappa_sim_default: 50.0
  failure_rate: 0.05
  drift_sigma: 0.0
  growth_rate_mom: 0.0
  seed: 42
  snapshot_start_offset: 50
  traffic_cv: 1.0
  expected_sample_seconds: 900

nodes:
  landing:
    start: true
    label: Landing
  created:
    label: Created
  delegated:
    label: Delegated
  registered:
    label: Registered
  success:
    label: Success
  dropout:
    absorbing: true
    label: Dropout

edges:
  landing-to-created:
    from: landing
    to: created
    p: 0.18
    onset: 0.0
    mu: 0.0
    sigma: 0.0
  created-to-delegated:
    from: created
    to: delegated
    p: 0.55
    onset: 0.0
    mu: 0.0
    sigma: 0.0
  delegated-to-registered:
    from: delegated
    to: registered
    p: 0.12
    onset: 8.0
    mu: 3.8
    sigma: 0.40
  registered-to-success:
    from: registered
    to: success
    p: 0.70
    onset: 3.0
    mu: 2.5
    sigma: 0.35
