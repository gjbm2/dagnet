# Ground truth for synth-abc-context-mixed
#
# Linear chain (A → B → C) with mixed epochs:
#   Days 0-49: bare (uncontexted)
#   Days 50-99: contexted (channel dimension)
#
# Fills gap: mixed-epoch × linear chain. Simpler topology than diamond
# for isolating epoch routing bugs from join-node complexity.
#
# Same base truth as synth-simple-abc-context.
# Design reference: doc 44 §6 gap 3

# SHARED-CONTEXT:
#   dim 'synth-channel' renders to contexts/synth-channel.yaml
#     shared with: synth-3way-join-context, synth-abc-context-two-dim, synth-abc-sparse-1, synth-abc-sparse-2, synth-abc-sparse-3, synth-abc-sparse-4, synth-context-independent-pooled, synth-context-solo, synth-context-solo-mixed, synth-context-staggered, synth-context-two-dim, synth-context-two-dim-sparse, synth-diamond-context, synth-diamond-context-mixed, synth-diamond-context-sparse, synth-diamond-context-two-dim, synth-diamond-sparse-1, synth-diamond-sparse-2, synth-diamond-sparse-3, synth-diamond-sparse-4, synth-fanout-context, synth-fanout-context-mixed, synth-join-branch-context, synth-lattice-context, synth-mirror-4step-context, synth-simple-abc-context, synth-skip-context, synth-skip-context-sparse, synth-solo-sparse-1, synth-solo-sparse-2, synth-solo-sparse-3, synth-solo-sparse-4
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 50
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 63
  expected_sample_seconds: 1800

emit_context_slices: false

epochs:
  - label: "uncontexted"
    from_day: 0
    to_day: 49
    emit_context_slices: false
  - label: "contexted"
    from_day: 50
    to_day: 99
    emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-abcm-a-to-b:
            p_mult: 1.20
            mu_offset: -0.2
          synth-abcm-b-to-c:
            p_mult: 1.15
            mu_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-abcm-a-to-b:
            p_mult: 1.0
          synth-abcm-b-to-c:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-abcm-a-to-b:
            p_mult: 0.70
            mu_offset: 0.3
          synth-abcm-b-to-c:
            p_mult: 0.65
            mu_offset: 0.4

edges:
  synth-abcm-a-to-b:
    from: a
    to: b
    p: 0.70
    onset: 1.0
    mu: 2.3
    sigma: 0.5
  synth-abcm-b-to-c:
    from: b
    to: c
    p: 0.60
    onset: 2.0
    mu: 2.5
    sigma: 0.6

nodes:
  a:
    start: true
    type: entry
    label: A
    event_id: synth-abcm-a
  b:
    type: event
    label: B
    event_id: synth-abcm-b
  c:
    absorbing: true
    type: event
    label: C
    event_id: synth-abcm-c
    outcome_type: success

graph:
  name: synth-abc-context-mixed
  description: "Linear chain (A→B→C) with mixed epochs — days 0-49 bare, 50-99 contexted. Doc 44 gap coverage."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
