# Ground truth for synth-abc-sparse
#
# Linear chain (A → B → C) with sparsity layer, no context.
# Bare sparse baseline — isolates sparsity effects from context
# complexity.
#
# Fills gap: sparse × bare. Currently sparse graphs are all contexted.
# Design reference: doc 44 §6 gap 4

simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 50
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 65
  expected_sample_seconds: 900
  # Sparsity layer (doc 40)
  frame_drop_rate: 0.20
  toggle_rate: 0.03
  initial_absent_pct: 0.25

emit_context_slices: false

edges:
  synth-abcs-a-to-b:
    from: a
    to: b
    p: 0.70
    onset: 1.0
    mu: 2.3
    sigma: 0.5
  synth-abcs-b-to-c:
    from: b
    to: c
    p: 0.60
    onset: 2.0
    mu: 2.5
    sigma: 0.6

nodes:
  a:
    start: true
    type: entry
    label: A
    event_id: synth-abcs-a
  b:
    type: event
    label: B
    event_id: synth-abcs-b
  c:
    absorbing: true
    type: event
    label: C
    event_id: synth-abcs-c
    outcome_type: success

graph:
  name: synth-abc-sparse
  description: "Linear chain (A→B→C) bare with sparsity layer. Baseline sparse graph. Doc 44 gap coverage."

testing:
  thresholds:
    p_z: 3.0
    mu_z: 3.0
    sigma_z: 3.5
    onset_z: 3.5
