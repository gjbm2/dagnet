graph:
  name: synth-fanout-test
  description: Fan-out test graph for per-sibling completeness in branch groups
  anchor: synth-fo-anchor
  raw_ids: true
nodes:
  synth-fo-anchor:
    label: Anchor
    event_id: synth-fo-anchor-event
    is_start: true
  synth-fo-gate:
    label: Gate
    event_id: synth-fo-gate-event
  synth-fo-fast:
    label: Fast
    event_id: synth-fo-fast-event
    absorbing: true
    outcome_type: success
  synth-fo-slow:
    label: Slow
    event_id: synth-fo-slow-event
    absorbing: true
    outcome_type: success
edges:
  synth-fo-anchor-to-gate:
    from: synth-fo-anchor
    to: synth-fo-gate
    p: 0.8
    onset: 0.0
    mu: 0.0
    sigma: 0.0
  synth-fo-gate-to-fast:
    from: synth-fo-gate
    to: synth-fo-fast
    p: 0.45
    onset: 0.0
    mu: 0.5
    sigma: 0.3
  synth-fo-gate-to-slow:
    from: synth-fo-gate
    to: synth-fo-slow
    p: 0.35
    onset: 5.0
    mu: 2.0
    sigma: 0.6
simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  expected_sample_seconds: 900
