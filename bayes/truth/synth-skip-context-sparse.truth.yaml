# Ground truth for synth-skip-context-sparse
#
# Identical to synth-skip-context but with sparsity layer enabled (doc 40).
# Tests centred vs non-centred parameterisation under realistic snapshot
# DB availability patterns: random missing frames, start/stop signals,
# and initial absence of some edge×slice combinations.
#
# Anchor → Middle → Target → Outcome  (2-hop path)
# Anchor → Target → Outcome           (1-hop skip)
# Skip connection with MECE context dimension.

simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  expected_sample_seconds: 1800
  # Sparsity layer (doc 40)
  frame_drop_rate: 0.15
  toggle_rate: 0.02
  initial_absent_pct: 0.25

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-sk-anchor-to-middle:
            p_mult: 1.20
            mu_offset: -0.2
            onset_offset: 0.0
          synth-sk-anchor-to-target:
            p_mult: 1.20
            mu_offset: -0.2
            onset_offset: -0.1
          synth-sk-middle-to-target:
            p_mult: 1.15
            mu_offset: -0.2
            onset_offset: -0.2
          synth-sk-target-to-outcome:
            p_mult: 1.10
            mu_offset: -0.1
            onset_offset: -0.1
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-sk-anchor-to-middle:
            p_mult: 1.0
          synth-sk-anchor-to-target:
            p_mult: 1.0
          synth-sk-middle-to-target:
            p_mult: 1.0
          synth-sk-target-to-outcome:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-sk-anchor-to-middle:
            p_mult: 0.70
            mu_offset: 0.3
            onset_offset: 0.0
          synth-sk-anchor-to-target:
            p_mult: 0.65
            mu_offset: 0.3
            onset_offset: 0.2
          synth-sk-middle-to-target:
            p_mult: 0.70
            mu_offset: 0.3
            onset_offset: 0.3
          synth-sk-target-to-outcome:
            p_mult: 0.80
            mu_offset: 0.2
            onset_offset: 0.2

edges:
  synth-sk-anchor-to-middle:
    from: anchor
    to: middle
    p: 0.50
    onset: 0.0
    mu: 0.8
    sigma: 0.4
  synth-sk-anchor-to-target:
    from: anchor
    to: target
    p: 0.15
    onset: 0.5
    mu: 1.2
    sigma: 0.5
  synth-sk-middle-to-target:
    from: middle
    to: target
    p: 0.60
    onset: 1.0
    mu: 1.0
    sigma: 0.4
  synth-sk-target-to-outcome:
    from: target
    to: outcome
    p: 0.70
    onset: 0.5
    mu: 0.8
    sigma: 0.3

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-sk-anchor
  middle:
    type: event
    label: Middle
    event_id: synth-sk-middle
  target:
    type: event
    label: Target
    event_id: synth-sk-target
  outcome:
    absorbing: true
    type: event
    label: Outcome
    event_id: synth-sk-outcome
    outcome_type: success

graph:
  name: synth-skip-context-sparse
  description: "Skip connection with MECE context and sparsity layer (doc 40)."

testing:
  thresholds:
    p_z: 3.5
    mu_z: 3.5
    sigma_z: 4.0
    onset_z: 4.0
  per_slice_thresholds:
    p_slice_z: 4.0
    weight_z: 4.0
