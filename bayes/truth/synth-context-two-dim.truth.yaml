# Ground truth for synth-context-two-dim (S5 — two independent MECE dimensions)
#
# Anchor → Target (solo edge), uniform-epoch, two orthogonal context dimensions:
#   - synth-channel (3 values: google 60%, direct 30%, email 10%)
#   - synth-device  (2 values: mobile 55%, desktop 45%)
#
# This is the minimal graph for testing R2g compound pinned DSLs:
#   (window();cohort()).(context(synth-channel);context(synth-device)).
#
# Tests:
#   - Per-dimension tau: channel and device each get their own tau_slice
#   - 1/N kappa correction: with N=2, aggregate kappa scaled by 1/2
#   - Independent dimension effects: channel affects p, device affects p
#     independently — no interaction term
#   - Parent posterior width: should match single-dimension baseline
#     (not artificially narrow due to double-counting)
#
# Design reference: doc 14 §5.6 (per-dimension tau), §14.6d (1/N kappa),
#   §15A.2 (structural gaps), R2g-i (independent dimensions)

# SHARED-CONTEXT:
#   dim 'synth-channel' renders to contexts/synth-channel.yaml
#     shared with: synth-3way-join-context, synth-abc-context-mixed, synth-abc-context-two-dim, synth-abc-sparse-1, synth-abc-sparse-2, synth-abc-sparse-3, synth-abc-sparse-4, synth-context-independent-pooled, synth-context-solo, synth-context-solo-mixed, synth-context-staggered, synth-context-two-dim-sparse, synth-diamond-context, synth-diamond-context-mixed, synth-diamond-context-sparse, synth-diamond-context-two-dim, synth-diamond-sparse-1, synth-diamond-sparse-2, synth-diamond-sparse-3, synth-diamond-sparse-4, synth-fanout-context, synth-fanout-context-mixed, synth-join-branch-context, synth-lattice-context, synth-mirror-4step-context, synth-simple-abc-context, synth-skip-context, synth-skip-context-sparse, synth-solo-sparse-1, synth-solo-sparse-2, synth-solo-sparse-3, synth-solo-sparse-4
#   dim 'synth-device' renders to contexts/synth-device.yaml
#     shared with: synth-abc-context-two-dim, synth-context-staggered, synth-context-two-dim-sparse, synth-diamond-context-two-dim
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 45
  expected_sample_seconds: 2400

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-2d-anchor-to-target:
            p_mult: 1.33
            mu_offset: -0.3
            onset_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-2d-anchor-to-target:
            p_mult: 0.83
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-2d-anchor-to-target:
            p_mult: 0.50
            mu_offset: 0.4
            onset_offset: 0.5

  - id: synth-device
    mece: true
    values:
      - id: mobile
        label: Mobile
        weight: 0.55
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'mobile'
        edges:
          synth-2d-anchor-to-target:
            p_mult: 1.15
            mu_offset: 0.2
      - id: desktop
        label: Desktop
        weight: 0.45
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'desktop'
        edges:
          synth-2d-anchor-to-target:
            p_mult: 0.85
            mu_offset: -0.2

edges:
  synth-2d-anchor-to-target:
    from: anchor
    to: target
    p: 0.30
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-2d-anchor
  target:
    type: event
    label: Target
    event_id: synth-2d-target

graph:
  name: synth-context-two-dim
  description: "S5: two independent MECE dimensions (channel + device). R2g compound DSL test."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
