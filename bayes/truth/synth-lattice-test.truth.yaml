# synth-lattice-test — generated from this truth file
#
# Lattice: A → {B, C} → {D, E} → F
# B connects to both D and E. C connects to both D and E.
# D and E both connect to F.
# This creates 4 paths to F (B→D, B→E, C→D, C→E) and multiple
# nested joins (D has 2 inbound, E has 2 inbound, F has 2 inbound
# each carrying 2 alternatives = 4 total paths to F).
#
# Tests combinatorial path propagation through nested joins.

graph:
  name: synth-lattice-test
  description: Lattice topology with cross-connections and nested joins

nodes:
  anchor: { label: Anchor, start: true }
  top: { label: Top }
  bottom: { label: Bottom }
  left: { label: Left }
  right: { label: Right }
  target: { label: Target }
  outcome: { label: Outcome, absorbing: true }

edges:
  anchor-to-top:
    from: anchor
    to: top
    p: 0.45
    onset: 0.0
    mu: 0.6
    sigma: 0.3
  anchor-to-bottom:
    from: anchor
    to: bottom
    p: 0.35
    onset: 0.5
    mu: 0.9
    sigma: 0.4
  top-to-left:
