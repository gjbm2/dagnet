# Ground truth for synth-context-staggered (S6 — staggered dimension introduction)
#
# Anchor → Target (solo edge), 90 days, two dimensions introduced at
# different times — the production scenario:
#
#   Days  0-29: state A — bare (no context data)
#   Days 30-59: state B — channel only (device not yet in pinnedDSL)
#   Days 60-89: state D — channel + device (both dimensions active)
#
# This exercises:
#   - Per-dimension epoch emission (emit_dimensions per epoch)
#   - Aggregate suppression: state A uses aggregate, states B+D do not
#   - Per-dimension hash assignment: channel and device rows get different
#     core_hashes; bare rows get bare hashes
#   - Per-dimension regime routing in the binder: device has no data in
#     state B, so device hierarchy learns only from state D dates
#   - Per-dimension tau: channel tau informed by 60 days (B+D), device
#     tau informed by 30 days (D only)
#   - 1/N kappa correction: N=2 in state D, but aggregate only exists
#     in state A (before any context)
#
# Context effects still influence simulation in all epochs (per-user p/mu
# variation exists on every day), but observations are only written for
# dimensions that are active in that epoch.
#
# See doc 14 §5.6, §5.7, §14.6d, §15A.2

# SHARED-CONTEXT:
#   dim 'synth-channel' renders to contexts/synth-channel.yaml
#     shared with: synth-3way-join-context, synth-abc-context-mixed, synth-abc-context-two-dim, synth-abc-sparse-1, synth-abc-sparse-2, synth-abc-sparse-3, synth-abc-sparse-4, synth-context-independent-pooled, synth-context-solo, synth-context-solo-mixed, synth-context-two-dim, synth-context-two-dim-sparse, synth-diamond-context, synth-diamond-context-mixed, synth-diamond-context-sparse, synth-diamond-context-two-dim, synth-diamond-sparse-1, synth-diamond-sparse-2, synth-diamond-sparse-3, synth-diamond-sparse-4, synth-fanout-context, synth-fanout-context-mixed, synth-join-branch-context, synth-lattice-context, synth-mirror-4step-context, synth-simple-abc-context, synth-skip-context, synth-skip-context-sparse, synth-solo-sparse-1, synth-solo-sparse-2, synth-solo-sparse-3, synth-solo-sparse-4
#   dim 'synth-device' renders to contexts/synth-device.yaml
#     shared with: synth-abc-context-two-dim, synth-context-two-dim, synth-context-two-dim-sparse, synth-diamond-context-two-dim
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 46
  expected_sample_seconds: 3000

emit_context_slices: false

epochs:
  - label: "bare"
    from_day: 0
    to_day: 29
    emit_dimensions: []
  - label: "channel-only"
    from_day: 30
    to_day: 59
    emit_dimensions: [synth-channel]
  - label: "both"
    from_day: 60
    to_day: 89
    emit_dimensions: [synth-channel, synth-device]

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-stag-anchor-to-target:
            p_mult: 1.33
            mu_offset: -0.3
            onset_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-stag-anchor-to-target:
            p_mult: 0.83
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-stag-anchor-to-target:
            p_mult: 0.50
            mu_offset: 0.4
            onset_offset: 0.5

  - id: synth-device
    mece: true
    values:
      - id: mobile
        label: Mobile
        weight: 0.55
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'mobile'
        edges:
          synth-stag-anchor-to-target:
            p_mult: 1.15
            mu_offset: 0.2
      - id: desktop
        label: Desktop
        weight: 0.45
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'desktop'
        edges:
          synth-stag-anchor-to-target:
            p_mult: 0.85
            mu_offset: -0.2

edges:
  synth-stag-anchor-to-target:
    from: anchor
    to: target
    p: 0.30
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-stag-anchor
  target:
    type: event
    label: Target
    event_id: synth-stag-target

graph:
  name: synth-context-staggered
  description: "S6: staggered dimension intro — bare → channel → channel+device. Production DSL evolution test."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
