# Ground truth for synth-abc-context-two-dim
#
# Linear chain (A → B → C) with two orthogonal MECE dimensions.
# Simplest multi-edge topology with cross-product DSL.
#
# Fills gap: 2-dim × multi-edge chain. Confirms per-slice posteriors
# propagate correctly through sequential edges.
#
# Same base truth as synth-simple-abc + device dimension.
# Design reference: doc 44 §6 gap 1

simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 50
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 62
  expected_sample_seconds: 2400

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-abc2d-a-to-b:
            p_mult: 1.20
            mu_offset: -0.2
          synth-abc2d-b-to-c:
            p_mult: 1.15
            mu_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-abc2d-a-to-b:
            p_mult: 1.0
          synth-abc2d-b-to-c:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-abc2d-a-to-b:
            p_mult: 0.70
            mu_offset: 0.3
          synth-abc2d-b-to-c:
            p_mult: 0.65
            mu_offset: 0.4

  - id: synth-device
    mece: true
    values:
      - id: mobile
        label: Mobile
        weight: 0.55
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'mobile'
        edges:
          synth-abc2d-a-to-b:
            p_mult: 1.15
            mu_offset: 0.2
          synth-abc2d-b-to-c:
            p_mult: 1.10
            mu_offset: 0.15
      - id: desktop
        label: Desktop
        weight: 0.45
        sources:
          amplitude:
            field: device_type
            filter: device_type == 'desktop'
        edges:
          synth-abc2d-a-to-b:
            p_mult: 0.85
            mu_offset: -0.2
          synth-abc2d-b-to-c:
            p_mult: 0.90
            mu_offset: -0.15

edges:
  synth-abc2d-a-to-b:
    from: a
    to: b
    p: 0.70
    onset: 1.0
    mu: 2.3
    sigma: 0.5
  synth-abc2d-b-to-c:
    from: b
    to: c
    p: 0.60
    onset: 2.0
    mu: 2.5
    sigma: 0.6

nodes:
  a:
    start: true
    type: entry
    label: A
    event_id: synth-abc2d-a
  b:
    type: event
    label: B
    event_id: synth-abc2d-b
  c:
    absorbing: true
    type: event
    label: C
    event_id: synth-abc2d-c
    outcome_type: success

graph:
  name: synth-abc-context-two-dim
  description: "Linear chain (A→B→C) with two orthogonal MECE dimensions. Doc 44 gap coverage."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
