graph:
  name: synth-join-branch-test
  description: 'Join then branch: {A,B}->Join->{Fast,Slow}. Tests mixture CDF flowing
    into Dirichlet.'
  anchor: synth-jb-anchor
  raw_ids: true
nodes:
  synth-jb-anchor:
    label: Anchor
    event_id: synth-jb-anchor-event
    is_start: true
  synth-jb-path-a:
    label: Path A
    event_id: synth-jb-path-a-event
  synth-jb-path-b:
    label: Path B
    event_id: synth-jb-path-b-event
  synth-jb-join:
    label: Join
    event_id: synth-jb-join-event
  synth-jb-fast:
    label: Fast Out
    event_id: synth-jb-fast-event
    absorbing: true
    outcome_type: success
  synth-jb-slow:
    label: Slow Out
    event_id: synth-jb-slow-event
    absorbing: true
    outcome_type: success
edges:
  synth-jb-anchor-to-a:
    from: synth-jb-anchor
    to: synth-jb-path-a
    p: 0.45
    onset: 0.0
    mu: 0.7
    sigma: 0.4
  synth-jb-anchor-to-b:
    from: synth-jb-anchor
    to: synth-jb-path-b
    p: 0.35
    onset: 0.5
    mu: 1.2
    sigma: 0.5
  synth-jb-a-to-join:
    from: synth-jb-path-a
    to: synth-jb-join
    p: 0.7
    onset: 0.5
    mu: 0.8
    sigma: 0.3
  synth-jb-b-to-join:
    from: synth-jb-path-b
    to: synth-jb-join
    p: 0.6
    onset: 1.0
    mu: 1.0
    sigma: 0.4
  synth-jb-join-to-fast:
    from: synth-jb-join
    to: synth-jb-fast
    p: 0.4
    onset: 0.0
    mu: 0.5
    sigma: 0.3
  synth-jb-join-to-slow:
    from: synth-jb-join
    to: synth-jb-slow
    p: 0.3
    onset: 2.0
    mu: 1.3
    sigma: 0.5
simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  expected_sample_seconds: 900
