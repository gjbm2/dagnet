# Ground truth for synth-context-solo (S1 — single MECE dimension, solo edge)
#
# Anchor → Target
# One edge, one context dimension (channel) with 3 values.
# Simplest possible contexted graph — exercises basic slice pooling
# without branch group or join complexity.
#
# Google:  high traffic (60%), high p (0.40), fast latency (mu-0.3, onset-0.3)
# Direct:  medium traffic (30%), medium p (0.25), baseline latency
# Email:   low traffic (10%), low p (0.15), slow latency (mu+0.4, onset+0.5)
#
# Recovery targets:
#   - Per-slice posterior HDI contains true p
#   - Per-slice latency posteriors recover mu/onset offsets
#   - Parent p_base HDI contains weighted aggregate
#   - Email (low traffic) should shrink toward base rate
#
# See doc 14 §12.2 "Graph S1"

# SHARED-CONTEXT:
#   dim 'synth-channel' renders to contexts/synth-channel.yaml
#     shared with: synth-3way-join-context, synth-abc-context-mixed, synth-abc-context-two-dim, synth-abc-sparse-1, synth-abc-sparse-2, synth-abc-sparse-3, synth-abc-sparse-4, synth-context-independent-pooled, synth-context-solo-mixed, synth-context-staggered, synth-context-two-dim, synth-context-two-dim-sparse, synth-diamond-context, synth-diamond-context-mixed, synth-diamond-context-sparse, synth-diamond-context-two-dim, synth-diamond-sparse-1, synth-diamond-sparse-2, synth-diamond-sparse-3, synth-diamond-sparse-4, synth-fanout-context, synth-fanout-context-mixed, synth-join-branch-context, synth-lattice-context, synth-mirror-4step-context, synth-simple-abc-context, synth-skip-context, synth-skip-context-sparse, synth-solo-sparse-1, synth-solo-sparse-2, synth-solo-sparse-3, synth-solo-sparse-4
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 90
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  expected_sample_seconds: 1800

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-ctx1-anchor-to-target:
            p_mult: 1.33    # 0.30 * 1.33 ≈ 0.40
            mu_offset: -0.3  # faster: mu = 1.5 - 0.3 = 1.2
            onset_offset: -0.3  # faster onset: 1.0 - 0.3 = 0.7
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-ctx1-anchor-to-target:
            p_mult: 0.83    # 0.30 * 0.83 ≈ 0.25
            # no latency offset — baseline
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-ctx1-anchor-to-target:
            p_mult: 0.50    # 0.30 * 0.50 ≈ 0.15
            mu_offset: 0.4   # slower: mu = 1.5 + 0.4 = 1.9
            onset_offset: 0.5 # slower onset: 1.0 + 0.5 = 1.5

edges:
  synth-ctx1-anchor-to-target:
    from: anchor
    to: target
    p: 0.30
    onset: 1.0
    mu: 1.5
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-ctx1-anchor
  target:
    type: event
    label: Target
    event_id: synth-ctx1-target

graph:
  name: synth-context-solo
  description: "S1: single MECE dimension (channel), solo edge. Phase C slice pooling test."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
