# Ground truth for synth-join-branch-context
#
# Anchor → {Path-A, Path-B} → Join → {Fast, Slow}
# Join then branch topology with MECE context dimension.
# Tests mixture CDF flowing into a downstream per-slice Dirichlet.
#
# Branch group 1 at Anchor: a (0.45) + b (0.35) = 0.80
# Branch group 2 at Join: fast (0.40) + slow (0.30) = 0.70
# Google p_mult 1.15: safe for both groups

# SHARED-CONTEXT:
#   dim 'synth-channel' renders to contexts/synth-channel.yaml
#     shared with: synth-3way-join-context, synth-abc-context-mixed, synth-abc-context-two-dim, synth-abc-sparse-1, synth-abc-sparse-2, synth-abc-sparse-3, synth-abc-sparse-4, synth-context-independent-pooled, synth-context-solo, synth-context-solo-mixed, synth-context-staggered, synth-context-two-dim, synth-context-two-dim-sparse, synth-diamond-context, synth-diamond-context-mixed, synth-diamond-context-sparse, synth-diamond-context-two-dim, synth-diamond-sparse-1, synth-diamond-sparse-2, synth-diamond-sparse-3, synth-diamond-sparse-4, synth-fanout-context, synth-fanout-context-mixed, synth-lattice-context, synth-mirror-4step-context, synth-simple-abc-context, synth-skip-context, synth-skip-context-sparse, synth-solo-sparse-1, synth-solo-sparse-2, synth-solo-sparse-3, synth-solo-sparse-4
# Overwrite model: any of these truths can rewrite the file on bootstrap.
# Affected graphs are flagged stale and must re-bootstrap before regression.
# See docs/current/codebase/SYNTH_CONTEXT_SHARING.md for the full contract.
simulation:
  mean_daily_traffic: 500
  n_days: 100
  user_kappa: 100
  failure_rate: 0.05
  drift_sigma: 0.0
  seed: 42
  expected_sample_seconds: 2700

emit_context_slices: true

context_dimensions:
  - id: synth-channel
    mece: true
    values:
      - id: google
        label: Google
        weight: 0.60
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'google'
        edges:
          synth-jb-anchor-to-a:
            p_mult: 1.15
            mu_offset: -0.1
            onset_offset: 0.0
          synth-jb-anchor-to-b:
            p_mult: 1.15
            mu_offset: -0.2
            onset_offset: -0.1
          synth-jb-a-to-join:
            p_mult: 1.10
            mu_offset: -0.1
            onset_offset: -0.1
          synth-jb-b-to-join:
            p_mult: 1.15
            mu_offset: -0.2
            onset_offset: -0.2
          synth-jb-join-to-fast:
            p_mult: 1.20
            mu_offset: -0.1
            onset_offset: 0.0
          synth-jb-join-to-slow:
            p_mult: 1.15
            mu_offset: -0.3
            onset_offset: -0.3
      - id: direct
        label: Direct
        weight: 0.30
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'direct'
        edges:
          synth-jb-anchor-to-a:
            p_mult: 1.0
          synth-jb-anchor-to-b:
            p_mult: 1.0
          synth-jb-a-to-join:
            p_mult: 1.0
          synth-jb-b-to-join:
            p_mult: 1.0
          synth-jb-join-to-fast:
            p_mult: 1.0
          synth-jb-join-to-slow:
            p_mult: 1.0
      - id: email
        label: Email
        weight: 0.10
        sources:
          amplitude:
            field: utm_medium
            filter: utm_medium == 'email'
        edges:
          synth-jb-anchor-to-a:
            p_mult: 0.75
            mu_offset: 0.2
            onset_offset: 0.0
          synth-jb-anchor-to-b:
            p_mult: 0.75
            mu_offset: 0.3
            onset_offset: 0.2
          synth-jb-a-to-join:
            p_mult: 0.80
            mu_offset: 0.2
            onset_offset: 0.2
          synth-jb-b-to-join:
            p_mult: 0.70
            mu_offset: 0.3
            onset_offset: 0.3
          synth-jb-join-to-fast:
            p_mult: 0.65
            mu_offset: 0.2
            onset_offset: 0.0
          synth-jb-join-to-slow:
            p_mult: 0.70
            mu_offset: 0.4
            onset_offset: 0.4

edges:
  synth-jb-anchor-to-a:
    from: anchor
    to: a
    p: 0.45
    onset: 0.0
    mu: 0.7
    sigma: 0.4
  synth-jb-anchor-to-b:
    from: anchor
    to: b
    p: 0.35
    onset: 0.5
    mu: 1.2
    sigma: 0.5
  synth-jb-a-to-join:
    from: a
    to: join
    p: 0.70
    onset: 0.5
    mu: 0.8
    sigma: 0.3
  synth-jb-b-to-join:
    from: b
    to: join
    p: 0.60
    onset: 1.0
    mu: 1.0
    sigma: 0.4
  synth-jb-join-to-fast:
    from: join
    to: fast
    p: 0.40
    onset: 0.0
    mu: 0.5
    sigma: 0.3
  synth-jb-join-to-slow:
    from: join
    to: slow
    p: 0.30
    onset: 2.0
    mu: 1.3
    sigma: 0.5

nodes:
  anchor:
    start: true
    type: entry
    label: Anchor
    event_id: synth-jb-anchor
  a:
    type: event
    label: Path A
    event_id: synth-jb-a
  b:
    type: event
    label: Path B
    event_id: synth-jb-b
  join:
    type: event
    label: Join
    event_id: synth-jb-join
  fast:
    absorbing: true
    type: event
    label: Fast
    event_id: synth-jb-fast
    outcome_type: success
  slow:
    absorbing: true
    type: event
    label: Slow
    event_id: synth-jb-slow
    outcome_type: success

graph:
  name: synth-join-branch-context
  description: "Join then branch with MECE context. Mixture CDF into per-slice Dirichlet."

testing:
  thresholds:
    p_z: 2.5
    mu_z: 2.5
    sigma_z: 3.0
    onset_z: 3.0
  per_slice_thresholds:
    p_slice_z: 3.0
    weight_z: 3.0
