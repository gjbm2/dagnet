graph:
  name: synth-diamond-test
  description: 'Synthetic diamond test graph: branch group + join + latency. Ground
    truth in .truth.yaml sidecar.'
  anchor: synth-anchor
  raw_ids: true
nodes:
  synth-anchor:
    label: Anchor
    event_id: synth-anchor-event
    is_start: true
  synth-gate:
    label: Gate
    event_id: synth-gate-event
  synth-path-a:
    label: Path A
    event_id: synth-path-a-event
  synth-path-b:
    label: Path B
    event_id: synth-path-b-event
  synth-join:
    label: Join
    event_id: synth-join-event
  synth-outcome:
    label: Outcome
    event_id: synth-outcome-event
    absorbing: true
    outcome_type: success
edges:
  synth-anchor-to-gate:
    from: synth-anchor
    to: synth-gate
    p: 0.85
    onset: 1.0
    mu: 2.0
    sigma: 0.5
  synth-gate-to-path-a:
    from: synth-gate
    to: synth-path-a
    p: 0.4
    onset: 2.0
    mu: 2.3
    sigma: 0.5
  synth-gate-to-path-b:
    from: synth-gate
    to: synth-path-b
    p: 0.35
    onset: 3.0
    mu: 2.5
    sigma: 0.6
  synth-path-a-to-join:
    from: synth-path-a
    to: synth-join
    p: 0.7
    onset: 1.0
    mu: 2.0
    sigma: 0.4
  synth-path-b-to-join:
    from: synth-path-b
    to: synth-join
    p: 0.6
    onset: 2.0
    mu: 2.2
    sigma: 0.5
  synth-join-to-outcome:
    from: synth-join
    to: synth-outcome
    p: 0.5
    onset: 1.0
    mu: 2.0
    sigma: 0.5
simulation:
  mean_daily_traffic: 500
  n_days: 100
  kappa_sim_default: 50.0
  failure_rate: 0.05
  drift_sigma: 0.0
  growth_rate_mom: 0.0
  seed: 42
  expected_sample_seconds: 900
